services:
  api:
    image: ghcr.io/andyrae/cd-build/api
    env_file: .env
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cd_api
      - DB_USERNAME=root
      - DB_PASSWORD=password
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    image: ghcr.io/andyrae/cd-build/ui
    env_file: .env
    environment:
      - NEXT_PUBLIC_LOGIN_URL=http://localhost:3000
      - NEXT_PUBLIC_TASK_URL=http://localhost:8080/api/v1
      - API_BASE_URL=http://api:8080
      - APPLICATION_MODE=standalone
      - NEXT_PUBLIC_USE_EXAMPLE_QUERY=true
      - NEXT_PUBLIC_USE_DEBUG_LOGS=true
      - SECURE_COOKIES=false
    ports:
      - 3000:3000
    depends_on:
      - api

  nlp:
    image: ghcr.io/andyrae/cd-build/nlp
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cd_api
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - APP_ENV=development
    ports:
      - 5001:5001
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=cd_api
    ports:
      - 3306:3306
    volumes:
      - ./db/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.0
    ports:
      - 6379:6379
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

